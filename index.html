<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth;font-size:17px}body{font-family:var(--sans);background:var(--bg);color:var(--ivory);-webkit-font-smoothing:antialiased;overflow-x:hidden;line-height:1.7}::selection{background:var(--accent);color:var(--bg)}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--faint);border-radius:2px}img{display:block;max-width:100%}a{color:inherit}button{font-family:inherit}
:root{--bg:#060a10;--bg2:#0c1222;--bg3:#111a2a;--bg4:#172134;--bg5:#1d2b40;--ivory:#e8ecf4;--ivory2:#c8d0e0;--sage:#8b9dc3;--sage2:#6b84b2;--muted:#4a6491;--dim:#2e4570;--faint:#1c3055;--accent:#06d6a0;--accent2:#38e8c0;--accent3:#6cf0d4;--accentdim:rgba(6,214,160,.07);--accentborder:rgba(6,214,160,.22);--line:#141e35;--line2:#1e2e4a;--serif:"DM Serif Display",Georgia,serif;--sans:"IBM Plex Sans",-apple-system,sans-serif;--mono:"JetBrains Mono",monospace}
.nav{position:fixed;top:0;width:100%;z-index:300;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(1.5rem,4vw,5rem);height:60px;background:rgba(6,10,16,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--line)}.nav-name{font-family:var(--serif);font-size:1.25rem;color:var(--ivory);text-decoration:none}.nav-name span{color:var(--accent)}.nav-links{display:flex;gap:.15rem}.nav-links a{color:var(--sage);text-decoration:none;font-size:.78rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:.45rem .85rem;border-radius:6px;transition:.25s}.nav-links a:hover{color:var(--ivory);background:var(--accentdim)}.hamburger{display:none;background:none;border:1px solid var(--line);color:var(--sage);padding:6px 10px;border-radius:6px;cursor:pointer;font-size:1.1rem}
.mob-overlay{position:fixed;inset:0;z-index:500;background:rgba(6,10,16,.98);backdrop-filter:blur(16px);display:none;flex-direction:column;align-items:center;justify-content:center;gap:.5rem}.mob-overlay a{color:var(--sage);text-decoration:none;font-size:1.15rem;font-weight:600;padding:.8rem 2.5rem;border-radius:8px;transition:.2s}.mob-overlay a:hover{color:var(--ivory);background:var(--accentdim)}.mob-close{position:absolute;top:1rem;right:1.5rem;background:none;border:none;color:var(--sage);font-size:1.6rem;cursor:pointer}
.hero{min-height:100vh;display:grid;grid-template-columns:1fr 360px;gap:clamp(2rem,5vw,5rem);align-items:center;padding:7rem clamp(2rem,5vw,5rem) 5rem;overflow:hidden}.hero-left{position:relative;z-index:2}.hero-eyebrow{font-family:var(--mono);font-size:.8rem;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;margin-bottom:1.8rem;display:flex;align-items:center;gap:.7rem}.hero-eyebrow::before{content:'';width:28px;height:1px;background:var(--accent)}.hero-title{font-family:var(--serif);font-weight:400;line-height:1.05;margin-bottom:1.4rem}.hero-title .l1{font-size:clamp(3.2rem,7vw,6rem);color:var(--ivory);display:block}.hero-title .l2{font-size:clamp(3.2rem,7vw,6rem);color:var(--sage);display:block;font-style:italic}.hero-sub{font-family:var(--serif);font-size:clamp(1.1rem,2vw,1.4rem);font-style:italic;color:var(--sage);margin-bottom:2.5rem;max-width:500px;line-height:1.55}
.hero-stats{display:flex;gap:0;margin-bottom:2.5rem;max-width:480px;border:1px solid var(--line);border-radius:10px;overflow:hidden}.hero-stat{flex:1;text-align:center;padding:1rem 0;border-right:1px solid var(--line);transition:.3s}.hero-stat:last-child{border-right:none}.hero-stat:hover{background:var(--bg2)}.sv{font-family:var(--serif);font-size:1.6rem;color:var(--ivory);display:block;margin-bottom:.1rem}.sl{font-size:.65rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.hero-contact{display:flex;flex-wrap:wrap;gap:1.5rem;margin-bottom:2rem}.hc{display:flex;flex-direction:column;gap:.1rem}.hc-l{font-family:var(--mono);font-size:.6rem;color:var(--dim);text-transform:uppercase;letter-spacing:.12em}.hc-v{font-size:.95rem;color:var(--ivory2);font-weight:500}.hc a{color:var(--accent);text-decoration:none;font-size:.95rem;font-weight:500;transition:.2s}.hc a:hover{color:var(--accent3)}
.pills{display:flex;flex-wrap:wrap;gap:.35rem}.pill{font-family:var(--mono);font-size:.7rem;padding:.25rem .65rem;border:1px solid var(--line);color:var(--sage);border-radius:4px;transition:.25s;cursor:default}.pill:hover{border-color:var(--accentborder);color:var(--accent);background:var(--accentdim)}
.hero-right{position:relative;z-index:2;display:flex;justify-content:center;align-items:center}.photo-wrap{position:relative;width:280px;height:360px}.photo-wrap::before{content:'';position:absolute;inset:-8px;border:1px solid var(--line2);border-radius:16px;transition:.5s}.photo-wrap:hover::before{inset:-14px;border-color:var(--accent)}.photo-inner{width:100%;height:100%;overflow:hidden;position:relative;z-index:1;background:var(--bg3);border:1px solid var(--line2);border-radius:14px;display:flex;align-items:center;justify-content:center}.photo-inner img{width:100%;height:100%;object-fit:cover}.photo-initials{font-family:var(--serif);font-size:5rem;color:var(--faint)}.photo-tag{position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);z-index:5;background:var(--bg);border:1px solid var(--line);border-radius:100px;padding:.35rem 1.1rem;font-family:var(--mono);font-size:.66rem;color:var(--accent);white-space:nowrap}.adot{display:inline-block;width:6px;height:6px;background:var(--accent2);border-radius:50%;margin-right:6px;animation:pulse 2.5s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sec{padding:5rem clamp(2rem,5vw,5rem);border-top:1px solid var(--line)}.sec:nth-child(even){background:var(--bg2)}.sn{font-family:var(--mono);font-size:.7rem;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;margin-bottom:.5rem}.st{font-family:var(--serif);font-size:clamp(2rem,4vw,3rem);color:var(--ivory);margin-bottom:.5rem}.sd{font-size:1rem;color:var(--muted);max-width:540px;margin-bottom:2.5rem;line-height:1.75}
.sum{max-width:840px}.sum p{font-size:1rem;color:var(--sage);line-height:1.95;margin-bottom:1.2rem}
.sk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1rem}.sk-card{background:var(--bg);padding:1.4rem;border:1px solid var(--line);border-radius:12px;transition:.3s}.sk-card:hover{border-color:var(--accentborder);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.2)}.sk-cat{font-size:.92rem;font-weight:700;color:var(--ivory);margin-bottom:.8rem}.sk-tags{display:flex;flex-wrap:wrap;gap:.3rem}.sk-tag{font-family:var(--mono);font-size:.68rem;padding:.22rem .55rem;background:var(--bg2);border:1px solid var(--line);border-radius:4px;color:var(--sage);transition:.2s}.sk-card:hover .sk-tag{border-color:var(--line2)}
.exp-tabs{display:flex;gap:.3rem;margin-bottom:2rem;flex-wrap:wrap}.exp-tab{padding:.55rem 1.1rem;border:1px solid var(--line);border-radius:8px;background:transparent;color:var(--sage);font-size:.88rem;font-weight:600;cursor:pointer;transition:.25s}.exp-tab:hover{border-color:var(--line2);color:var(--ivory)}.exp-tab.on{background:var(--accent);color:var(--bg);border-color:var(--accent)}.exp-company{font-family:var(--serif);font-size:2rem;color:var(--ivory);margin-bottom:.35rem}.exp-meta{display:flex;gap:1rem;flex-wrap:wrap;align-items:center;margin-bottom:1.2rem}.exp-role{font-size:1rem;font-weight:600;color:var(--sage)}.exp-loc{font-size:.88rem;color:var(--muted);font-style:italic}.exp-dates{font-family:var(--mono);font-size:.7rem;color:var(--accent);padding:.2rem .6rem;background:var(--accentdim);border:1px solid var(--accentborder);border-radius:100px}.exp-bullets{list-style:none;display:flex;flex-direction:column;max-width:880px}.exp-b{font-size:.95rem;color:var(--sage);line-height:1.8;padding:.85rem 0 .85rem 1.4rem;border-bottom:1px solid var(--line);position:relative;transition:.3s}.exp-b:last-child{border-bottom:none}.exp-b::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:5px;height:5px;border:1.5px solid var(--faint);border-radius:50%;transition:.3s}.exp-b:hover{color:var(--ivory)}.exp-b:hover::before{background:var(--accent);border-color:var(--accent)}

.edu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem}.edu{padding:1.4rem;background:var(--bg);border:1px solid var(--line);border-radius:12px;transition:.3s}.edu:hover{border-color:var(--accentborder);transform:translateY(-2px)}.edu-yr{font-family:var(--mono);font-size:.7rem;color:var(--accent);margin-bottom:.5rem}.edu-deg{font-family:var(--serif);font-size:1.08rem;color:var(--ivory);margin-bottom:.25rem;line-height:1.35}.edu-sch{font-size:.88rem;color:var(--sage);font-weight:500;margin-bottom:.1rem}.edu-loc{font-size:.8rem;color:var(--muted);font-style:italic}
.award-list{display:flex;flex-direction:column;max-width:840px;border-top:1px solid var(--line)}.award{display:flex;gap:.9rem;align-items:flex-start;padding:1.1rem 0;border-bottom:1px solid var(--line);transition:.3s}.award:hover{padding-left:.5rem}.award-mark{width:6px;height:6px;min-width:6px;background:var(--faint);border-radius:50%;margin-top:8px;transition:.3s}.award:hover .award-mark{background:var(--accent)}.award-body{font-size:.95rem;color:var(--sage);line-height:1.7}.award-body strong{color:var(--ivory);font-weight:600}.award-body a{color:var(--accent);text-decoration:none;word-break:break-all;transition:.2s}.award-body a:hover{color:var(--accent3)}
.contact{text-align:center;padding:6rem clamp(2rem,5vw,5rem)}.contact-desc{font-size:1rem;color:var(--muted);margin-bottom:2rem;max-width:460px;margin-left:auto;margin-right:auto;line-height:1.7}.contact-btns{display:flex;justify-content:center;gap:.6rem;flex-wrap:wrap}.cbtn{display:inline-flex;align-items:center;gap:.45rem;padding:.7rem 1.4rem;border:1px solid var(--line);border-radius:10px;color:var(--ivory2);text-decoration:none;font-size:.9rem;font-weight:600;transition:.3s;background:var(--bg)}.cbtn:hover{border-color:var(--accentborder);background:var(--accentdim);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.2)}.cbtn.primary{background:var(--accent);color:var(--bg);border-color:var(--accent)}.cbtn.primary:hover{background:var(--accent2)}
footer{text-align:center;padding:2.5rem;border-top:1px solid var(--line);font-size:.72rem;color:var(--dim)}
@keyframes fi{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}.fade-in{opacity:0;animation:fi .7s forwards}
@media(max-width:960px){.hero{grid-template-columns:1fr;gap:2rem}.hero-right{order:-1}.photo-wrap{width:220px;height:280px}.nav-links{display:none}.hamburger{display:block}}
@media(max-width:640px){html{font-size:16px}.hero{padding:5.5rem 1.25rem 3rem}.sec{padding:3rem 1.25rem}.hero-stats{flex-direction:column}.hero-stat{border-right:none;border-bottom:1px solid var(--line)}.hero-stat:last-child{border-bottom:none}.photo-wrap{width:180px;height:230px}.sk-grid,.cert-grid,.edu-grid{grid-template-columns:1fr}.exp-tabs{flex-direction:column;gap:.25rem}.contact-btns{flex-direction:column;align-items:center}}
</style>

document.getElementById('app').innerHTML=`
<nav class="nav"><a href="#" class="nav-name">${d.firstName} <span>${d.lastName}</span></a><div class="nav-links"><a href="#about">About</a><a href="#skills">Skills</a><a href="#experience">Experience</a><a href="#certs">Certs</a><a href="#education">Education</a><a href="#awards">Awards</a><a href="#contact">Contact</a></div><button class="hamburger" onclick="document.querySelector('.mob-overlay').style.display='flex'">☰</button></nav>
<div class="mob-overlay"><button class="mob-close" onclick="this.parentElement.style.display='none'">✕</button>${['About','Skills','Experience','Certs','Education','Awards','Contact'].map(n=>'<a href="#'+n.toLowerCase()+'" onclick="this.parentElement.style.display=\'none\'">'+n+'</a>').join('')}</div>
<section class="hero" id="about"><div class="hero-left"><div class="hero-eyebrow fade-in" style="animation-delay:.1s">Software Consultant — 17+ Years</div><h1 class="hero-title fade-in" style="animation-delay:.25s"><span class="l1">${esc(d.heroTitle[0])}</span><span class="l2">${esc(d.heroTitle[1])}</span></h1><p class="hero-sub fade-in" style="animation-delay:.4s">${esc(d.heroSubtitle)}</p><div class="hero-stats fade-in" style="animation-delay:.55s">${d.stats.map(s=>'<div class="hero-stat"><span class="sv">'+esc(s.value)+'</span><span class="sl">'+esc(s.label)+'</span></div>').join('')}</div><div class="hero-contact fade-in" style="animation-delay:.65s"><div class="hc"><span class="hc-l">Location</span><span class="hc-v">${esc(d.location)}${d.openToRelocate?' — Open to Relocate':''}</span></div><div class="hc"><span class="hc-l">Phone</span><a href="tel:${d.phone}">${d.phone}</a></div><div class="hc"><span class="hc-l">Email</span><a href="mailto:${d.email}">${d.email}</a></div><div class="hc"><span class="hc-l">LinkedIn</span><a href="${d.linkedin}" target="_blank">${d.linkedinLabel}</a></div></div><div class="pills fade-in" style="animation-delay:.8s">${d.availableFor.map(a=>'<span class="pill">'+esc(a)+'</span>').join('')}</div></div><div class="hero-right fade-in" style="animation-delay:.3s"><div class="photo-wrap"><div class="photo-inner">${d.photo?'<img src="'+d.photo+'" alt="'+d.name+'">':'<div class="photo-initials">'+d.initials+'</div>'}</div><div class="photo-tag"><span class="adot"></span>Available for consulting</div></div></div></section>
<section class="sec" id="summary"><div class="sn">00 — Profile</div><h2 class="st">Summary</h2><div class="sum"><p>${esc(d.summaryP1)}</p><p>${esc(d.summaryP2)}</p>${d.summaryP3?'<p>'+esc(d.summaryP3)+'</p>':''}</div></section>
<section class="sec" id="skills"><div class="sn">01 — Technical Skills</div><h2 class="st">Expertise</h2><p class="sd">Complete proficiency across GPU/HPC, cloud platforms, AI/ML frameworks, and infrastructure.</p><div class="sk-grid">${d.skills.map(s=>'<div class="sk-card"><div class="sk-cat">'+esc(s.cat)+'</div><div class="sk-tags">'+s.items.map(i=>'<span class="sk-tag">'+esc(i)+'</span>').join('')+'</div></div>').join('')}</div></section>
<section class="sec" id="experience"><div class="sn">02 — Experience</div><h2 class="st">Career</h2><p class="sd">17+ years across enterprise platforms, AI infrastructure, GPU computing, multi-cloud architecture, and agentic systems.</p><div class="exp-tabs">${d.experience.map((x,i)=>'<button class="exp-tab'+(i===0?' on':'')+'" onclick="showExp('+i+')">'+esc(x.company.split('/')[0].trim())+'</button>').join('')}</div>${d.experience.map((x,i)=>'<div class="exp-panel" id="exp-'+i+'"'+(i>0?' style="display:none"':'')+'><div class="exp-company">'+esc(x.company)+'</div><div class="exp-meta"><span class="exp-role">'+esc(x.role)+'</span><span class="exp-loc">'+esc(x.location)+'</span><span class="exp-dates">'+esc(x.dates)+'</span></div><ul class="exp-bullets">'+x.bullets.map(b=>'<li class="exp-b">'+esc(b)+'</li>').join('')+'</ul></div>').join('')}</section>
<section class="sec" id="certs"><div class="sn">03 — Certifications</div><h2 class="st">Credentials</h2><p class="sd">Industry certifications across cloud, Kubernetes, ML, GPU infrastructure, IBM, and security.</p><div class="cert-grid">${d.certifications.map(c=>'<div class="cert"><div class="cert-logo" style="color:'+c.brandColor+'">'+(LOGOS[c.logoKey]||LOGOS.oracle)+'</div><div class="cert-name">'+esc(c.name)+'</div></div>').join('')}</div></section>
<section class="sec" id="education"><div class="sn">04 — Education</div><h2 class="st">Academic</h2><div class="edu-grid">${d.education.map(x=>'<div class="edu"><div class="edu-yr">'+esc(x.years)+'</div><div class="edu-deg">'+esc(x.degree)+'</div><div class="edu-sch">'+esc(x.school)+'</div><div class="edu-loc">'+esc(x.location)+'</div></div>').join('')}</div></section>
<section class="sec" id="awards"><div class="sn">05 — Awards &amp; Publications</div><h2 class="st">Recognition</h2><div class="award-list">${d.awards.map(a=>'<div class="award"><div class="award-mark"></div><span class="award-body"><strong>'+esc(a.title)+'</strong>'+(a.text?' — '+esc(a.text):'')+(a.link?' <a href="'+a.link+'" target="_blank">'+a.link+'</a>':'')+'</span></div>').join('')}</div></section>
<section class="contact sec" id="contact"><div class="sn" style="text-align:center">06 — Contact</div><h2 class="st" style="text-align:center">Let&apos;s work together.</h2><p class="contact-desc">Available for ${d.availableFor.slice(0,4).join(', ')}, and more.</p><div class="contact-btns"><a class="cbtn primary" href="mailto:${d.email}">Email Me</a><a class="cbtn" href="tel:${d.phone}">${d.phone}</a><a class="cbtn" href="${d.linkedin}" target="_blank">LinkedIn</a>${d.researchgate?'<a class="cbtn" href="'+d.researchgate+'" target="_blank">ResearchGate</a>':''}</div></section>
<footer>&copy; ${new Date().getFullYear()} ${esc(d.name)}. All rights reserved.</footer>`;
function showExp(n){document.querySelectorAll('.exp-panel').forEach(p=>p.style.display='none');document.querySelectorAll('.exp-tab').forEach(t=>t.classList.remove('on'));document.getElementById('exp-'+n).style.display='block';document.querySelectorAll('.exp-tab')[n].classList.add('on')}
</script>
</body>
</html>
